# Ablation 01: ELF baseline (vanilla, K=1, no parallel thought)
# Routes through original train_step.py and ELF_models (not ELF-PT).

data_path: "embedded-language-flows/wmt14_de-en_train_t5"
eval_data_path: "embedded-language-flows/wmt14_de-en_validation_t5"

encoder_model_name: t5-small
encoder_checkpoint: "embedded-language-flows/t5_small_encoder_jax/t5_small_encoder_jax.pkl"
latent_mean: 0.0
latent_std: 0.2

model: ELF-B
num_thoughts: 1
num_reasoning_thoughts: 0

bottleneck_dim: 128
num_time_tokens: 4
num_self_cond_cfg_tokens: 4
num_model_mode_tokens: 4
max_length: 128

denoiser_p_mean: -1.5
denoiser_p_std: 0.8
denoiser_noise_scale: 2.0
t_eps: 0.05
time_schedule: "logit_normal"

decoder_prob: 0.2
decoder_noise_scale: 5.0
decoder_p_mean: 0.8
decoder_p_std: 0.8
self_cond_prob: 0.5

epochs: 1
# batch 256 OOM'd on A100 80GB (60 GB single allocation, likely Muon optimizer state
# + self-cond doubled input). Drop to 96 to match K_r=1 R-mode batch for fair compute.
global_batch_size: 96
grad_accum_steps: 1
blr: 0.001
warmup_steps: 500
optimizer: muon

ema_decay1: 0.9999

sampling_configs_path: "configs/sampling_configs/cond_sampling_configs.yml"
num_samples: 8

log_freq: 50
save_freq: 9999
eval_freq: 9999

output_dir: outputs/ablation/01_elf_baseline
online_eval: false
use_wandb: true
wandb_project: elf-pt-ablation
wandb_entity: crlc112358
wandb_run_name: ablation_01_elf_baseline
