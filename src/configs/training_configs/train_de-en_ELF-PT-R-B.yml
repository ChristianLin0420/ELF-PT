# ELF-PT-R: K=2 reasoning + 1 answer with causal inter mask + diversity loss.
# Initial feasibility config for the WMT14 De-En task.

data_path: "embedded-language-flows/wmt14_de-en_train_t5"
eval_data_path: "embedded-language-flows/wmt14_de-en_validation_t5"

encoder_model_name: t5-small
encoder_checkpoint: "embedded-language-flows/t5_small_encoder_jax/t5_small_encoder_jax.pkl"
latent_mean: 0.0
latent_std: 0.2

model: ELF-PT-B
num_thoughts: 3                     # K_total = K_reasoning + 1
num_reasoning_thoughts: 2
use_causal_inter_mask: true
diversity_loss_weight: 0.01
diversity_loss_t_gating: true
thought_block_pattern: "intra,inter"
thought_aggregation: mean            # ignored in R-mode but present for fallback
inter_block_zero_init: true

bottleneck_dim: 128
num_time_tokens: 4
num_self_cond_cfg_tokens: 4
num_model_mode_tokens: 4
max_length: 128

denoiser_p_mean: -1.5
denoiser_p_std: 0.8
denoiser_noise_scale: 2.0
t_eps: 0.05
time_schedule: "logit_normal"

decoder_prob: 0.2
decoder_noise_scale: 5.0
decoder_p_mean: 0.8
decoder_p_std: 0.8

# Self-cond in R-mode currently uses an approximation for reasoning slots; disable
# for the initial run to keep the comparison clean. Re-enable once a clean R-mode
# self-cond path is implemented.
self_cond_prob: 0.0

# K_total=3 → sequence length is 1.5x the symmetric K=2 baseline. Attention is
# quadratic in sequence so batch must drop further. Start conservative at 48.
epochs: 1
global_batch_size: 48
grad_accum_steps: 1
blr: 0.001
warmup_steps: 500
optimizer: muon

ema_decay1: 0.9999

sampling_configs_path: "configs/sampling_configs/cond_sampling_configs.yml"
num_samples: 8

log_freq: 50
save_freq: 0.1
eval_freq: 9999

output_dir: outputs/pt_r_k2_wmt14
online_eval: false
use_wandb: true
wandb_project: elf-pt
wandb_entity: crlc112358
wandb_run_name: pt_r_k2_wmt14_bs48
